<text x="20" y="27" font-size="16" font-weight="700" fill="#111">water.rs — growth rate per step, as a function of WAVENUMBER (the Brillouin zone)</text>
<text x="20" y="47" font-size="11" fill="#555">θ=1, n=0.04, no cap — the scheme before the three fixes. k = 0 at centre; the CORNERS are the checkerboard (Nyquist). Red =</text><text x="20" y="62" font-size="11" fill="#555">growing. The instability is a LONG WAVE along the flow, and the checkerboard corner is quiet. A null-space/checkerboard disease</text><text x="20" y="77" font-size="11" fill="#555">would look like the exact opposite of this picture.</text><rect x="20.0" y="101.0" width="24.0" height="24.0" fill="rgb(40,90,190)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="44.0" y="101.0" width="24.0" height="24.0" fill="rgb(90,128,205)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="68.0" y="101.0" width="24.0" height="24.0" fill="rgb(132,160,217)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="92.0" y="101.0" width="24.0" height="24.0" fill="rgb(162,183,226)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="116.0" y="101.0" width="24.0" height="24.0" fill="rgb(177,195,231)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="140.0" y="101.0" width="24.0" height="24.0" fill="rgb(170,189,229)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="164.0" y="101.0" width="24.0" height="24.0" fill="rgb(126,156,216)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="188.0" y="101.0" width="24.0" height="24.0" fill="rgb(170,189,229)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="212.0" y="101.0" width="24.0" height="24.0" fill="rgb(177,195,231)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="236.0" y="101.0" width="24.0" height="24.0" fill="rgb(162,183,226)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="260.0" y="101.0" width="24.0" height="24.0" fill="rgb(132,160,217)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="284.0" y="101.0" width="24.0" height="24.0" fill="rgb(90,128,205)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="20.0" y="125.0" width="24.0" height="24.0" fill="rgb(50,98,193)" stroke="#e6e6ee" stroke-width="0.4"/><rect x="44.0" y="125.0" width="24.0" height="24.0" fill="rgb(101,